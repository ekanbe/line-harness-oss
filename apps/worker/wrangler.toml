name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "5ff384dcdbe7a3d033ff7999e16cf134"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "968175ba-8134-4030-a650-c182804b9268"

# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]
